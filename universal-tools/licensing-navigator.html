<style>
#nerdio-auth-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #0B1B3D 0%, #122a5c 50%, #0B1B3D 100%);
    z-index: 999999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
#nerdio-auth-overlay.hidden { display: none; }
.nerdio-auth-box {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.nerdio-auth-box .auth-icon {
    width: 64px; height: 64px;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, #00B4D8, #00C48C);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
}
.nerdio-auth-box .auth-icon svg { width: 32px; height: 32px; }
.nerdio-auth-box h2 {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 8px;
}
.nerdio-auth-box p {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    margin: 0 0 28px;
}
.nerdio-auth-box input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
}
.nerdio-auth-box input[type="password"]::placeholder { color: rgba(255,255,255,0.35); }
.nerdio-auth-box input[type="password"]:focus { border-color: #00B4D8; }
.nerdio-auth-box .auth-btn {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    background: linear-gradient(135deg, #00B4D8, #00C48C);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
}
.nerdio-auth-box .auth-btn:hover { opacity: 0.9; }
.nerdio-auth-box .auth-btn:active { transform: scale(0.98); }
.nerdio-auth-box .auth-error {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    display: none;
}
.nerdio-auth-box .auth-footer {
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    margin-top: 24px;
}
</style>
<div id="nerdio-auth-overlay">
    <div class="nerdio-auth-box">
        <div class="auth-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
        </div>
        <h2>EMEA Nerdio Toolbox</h2>
        <p>Enter the team password to continue</p>
        <form id="nerdio-auth-form" onsubmit="return nerdioAuth()">
            <input type="password" id="nerdio-auth-pwd" placeholder="Team password" autofocus>
            <button type="submit" class="auth-btn">Unlock Toolbox</button>
            <div class="auth-error" id="nerdio-auth-error">Incorrect password. Please try again.</div>
        </form>
        <div class="auth-footer">Nerdio EMEA &mdash; Internal Use Only</div>
    </div>
</div>
<script>
(function(){
    var AUTH_KEY = 'nerdio-emea-auth';
    var HASH = '8d4fc32913788be20e3ed56e0e9598b490bc0a8023036548b73715eca41d80d0';
    async function sha256(str) {
        var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
    }
    if (sessionStorage.getItem(AUTH_KEY) === 'true') {
        document.getElementById('nerdio-auth-overlay').classList.add('hidden');
    }
    window.nerdioAuth = async function() {
        var pwd = document.getElementById('nerdio-auth-pwd').value;
        var hash = await sha256(pwd);
        if (hash === HASH) {
            sessionStorage.setItem(AUTH_KEY, 'true');
            document.getElementById('nerdio-auth-overlay').classList.add('hidden');
        } else {
            document.getElementById('nerdio-auth-error').style.display = 'block';
            document.getElementById('nerdio-auth-pwd').value = '';
            document.getElementById('nerdio-auth-pwd').focus();
        }
        return false;
    };
})();
</script>

        description:"Board-level AI initiative — delivering Copilot securely to all knowledge workers",
        recommended_base:"m365_e3",
        recommended_addons:["copilot_m365","aad_p1","purview","avd_access","azure_compute"],
        trigger:"CIO AI strategy, Copilot pilot, productivity uplift programme",
        nerdio_pitch:"AVD + Nerdio is the optimal Copilot delivery vehicle — centralised, secure, and optimised. Nerdio ensures FSLogix profiles are correctly configured so Copilot features work reliably in every virtual session." },
    ];

    const CATEGORIES = ["All","AI","Endpoint","Identity","Security","Compliance","W365","AVD"];

    function catColor(cat) {
      const map = { AI:NERDIO_GREEN, Endpoint:"#F59E0B", Identity:"#A795C7", Security:"#EF4444", Compliance:"#F97316", W365:"#8B5CF6", AVD:NERDIO_BLUE };
      return map[cat] || "#94A3B8";
    }
    function thStyle(align="center") {
      return { textAlign:align, padding:"10px 12px", fontSize:11, fontWeight:700, color:NERDIO_BLUE, textTransform:"uppercase", letterSpacing:"0.06em", borderBottom:"1px solid #0d3a50" };
    }
    function tdStyle(align="center") {
      return { textAlign:align, padding:"9px 12px", color:"#CBD5E1", borderBottom:"1px solid #0d3a5055", verticalAlign:"top" };
    }

    // ── SUB-COMPONENTS ──────────────────────────────────────────────────────

    function TierBadge({ t }) {
      const colors = { F:"#6B7280", E1:"#9CA3AF", E3:"#0078D4", E5:"#1E9DB8", BP:"#008272" };
      return <span style={{ background:colors[t]||"#6B7280", color:"#fff", fontSize:10, fontWeight:700, padding:"2px 6px", borderRadius:4, letterSpacing:"0.08em", marginLeft:6 }}>{t}</span>;
    }

    function Badge({ label, color, dark }) {
      return <span style={{ fontSize:10, padding:"2px 6px", borderRadius:4, background: dark ? color : color+"22", color: dark ? NERDIO_NAVY : color, fontWeight:700, border:`1px solid ${color}44` }}>{label}</span>;
    }

    function SummaryLine({ label, value, highlight, bold }) {
      return (
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, padding:"3px 0", borderBottom:"1px solid #0d3a5055" }}>
          <span style={{ color:"#94A3B8" }}>{label}</span>
          <span style={{ fontWeight: bold ? 800 : 600, color: highlight ? NERDIO_GREEN : "#E2E8F0" }}>{value}</span>
        </div>
      );
    }

    function Tick({ val }) {
      return <span style={{ fontSize:14 }}>{val ? "✅" : "❌"}</span>;
    }

    function SectionHeader({ title, subtitle, right }) {
      return (
        <div style={{ marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:14, fontWeight:700, color:"#fff" }}>{title}</div>
            {subtitle && <div style={{ fontSize:11, color:"#64748B", marginTop:2 }}>{subtitle}</div>}
          </div>
          {right && <div>{right}</div>}
        </div>
      );
    }

    function BundleCard({ bundle, selected, onSelect }) {
      return (
        <div onClick={onSelect} style={{ background: selected ? `linear-gradient(135deg,${NERDIO_BLUE}22,${NERDIO_GREEN}11)` : "#073d56", border:`1px solid ${selected ? NERDIO_GREEN : "#0d3a50"}`, borderRadius:10, padding:"10px 14px", cursor:"pointer", transition:"all 0.15s", display:"flex", gap:12, alignItems:"flex-start" }}>
          <div style={{ width:20, height:20, borderRadius:"50%", flexShrink:0, marginTop:2, background: selected ? NERDIO_GREEN : "#0d3a50", border:`2px solid ${selected ? NERDIO_GREEN : "#1E9DB855"}`, display:"flex", alignItems:"center", justifyContent:"center" }}>
            {selected && <span style={{ fontSize:11, color:NERDIO_NAVY }}>✓</span>}
          </div>
          <div style={{ flex:1 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:4 }}>
              <span style={{ fontSize:13, fontWeight:700, color:"#fff" }}>{bundle.name}</span>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <TierBadge t={bundle.tier} />
                <span style={{ fontSize:13, fontWeight:700, color:NERDIO_GREEN }}>${bundle.monthly.toFixed(2)}/user</span>
              </div>
            </div>
            <div style={{ display:"flex", gap:6, marginTop:6, flexWrap:"wrap" }}>
              {bundle.avd && <Badge label="AVD" color={NERDIO_BLUE} />}
              {bundle.w365 && <Badge label="W365" color="#8B5CF6" />}
              {bundle.copilot_eligible && <Badge label="Copilot" color={NERDIO_GREEN} dark />}
            </div>
            <div style={{ fontSize:11, color:"#64748B", marginTop:5, lineHeight:1.4 }}>{bundle.notes}</div>
          </div>
        </div>
      );
    }

    function AddonCard({ addon, eligible, checked, onToggle, showNerdio }) {
      const dimmed = !eligible;
      return (
        <div onClick={eligible ? onToggle : undefined} style={{ background: checked ? `linear-gradient(135deg,${NERDIO_BLUE}22,${NERDIO_GREEN}11)` : "#073d56", border:`1px solid ${checked ? NERDIO_GREEN : dimmed ? "#0d3a5044" : "#0d3a50"}`, borderRadius:10, padding:"10px 14px", cursor: eligible ? "pointer" : "not-allowed", opacity: dimmed ? 0.4 : 1, transition:"all 0.15s" }}>
          <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
            <div style={{ width:18, height:18, borderRadius:4, flexShrink:0, marginTop:1, background: checked ? NERDIO_GREEN : "#0d3a50", border:`2px solid ${checked ? NERDIO_GREEN : "#1E9DB855"}`, display:"flex", alignItems:"center", justifyContent:"center" }}>
              {checked && <span style={{ fontSize:10, color:NERDIO_NAVY }}>✓</span>}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                <span style={{ fontSize:12, fontWeight:600, color: dimmed ? "#64748B" : "#fff" }}>{addon.icon} {addon.name}</span>
                <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                  <span style={{ fontSize:10, padding:"2px 6px", borderRadius:10, background:catColor(addon.category)+"33", color:catColor(addon.category) }}>{addon.category}</span>
                  <span style={{ fontSize:12, fontWeight:700, color: addon.monthly === 0 ? NERDIO_GREEN : "#E2E8F0" }}>
                    {addon.monthly === null ? "PAYG" : addon.monthly === 0 ? "Included" : `$${addon.monthly}`}
                  </span>
                </div>
              </div>
              <div style={{ fontSize:11, color:"#64748B", marginTop:3, lineHeight:1.4 }}>{addon.description}</div>
              {showNerdio && addon.nerdio_note && (
                <div style={{ fontSize:11, color:"#A7D8E8", marginTop:5, lineHeight:1.4 }}>
                  <span style={{ color:NERDIO_GREEN }}>→ </span>{addon.nerdio_note}
                </div>
              )}
              {!eligible && addon.requires.length > 0 && (
                <div style={{ fontSize:10, color:"#C0392B", marginTop:3 }}>
                  ⚠ Requires: {addon.requires.map(r => BUNDLES[r]?.name || r).join(" or ")}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────────────────────

    function App() {
      const [selectedBase, setSelectedBase]     = useState(null);
      const [selectedAddons, setSelectedAddons] = useState([]);
      const [activeScenario, setActiveScenario] = useState(null);
      const [addonFilter, setAddonFilter]       = useState("All");
      const [activeTab, setActiveTab]           = useState("builder");
      const [userCount, setUserCount]           = useState(100);
      const [showNerdioTips, setShowNerdioTips] = useState(true);

      const baseBundle = selectedBase ? BUNDLES[selectedBase] : null;

      const filteredAddons = useMemo(() =>
        addonFilter === "All" ? ADDONS : ADDONS.filter(a => a.category === addonFilter),
        [addonFilter]);

      const perUserCost = useMemo(() => {
        const base = baseBundle ? baseBundle.monthly : 0;
        return base + selectedAddons.reduce((sum, id) => {
          const a = ADDONS.find(x => x.id === id);
          return sum + (a && a.monthly ? a.monthly : 0);
        }, 0);
      }, [baseBundle, selectedAddons]);

      const totalMonthlyCost = useMemo(() => perUserCost * userCount, [perUserCost, userCount]);

      const nerdioRelevantAddons = selectedAddons.filter(id => {
        const a = ADDONS.find(x => x.id === id);
        return a && a.nerdio_note;
      });

      function applyScenario(s) {
        setActiveScenario(s.id);
        setSelectedBase(s.recommended_base);
        setSelectedAddons(s.recommended_addons);
        setActiveTab("builder");
      }

      function toggleAddon(id) {
        setSelectedAddons(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      }

      return (
        <div style={{ fontFamily:"'Segoe UI',system-ui,sans-serif", background:NERDIO_NAVY, minHeight:"100vh", color:"#E8F4F8" }}>

          {/* ── HEADER ── */}
          <div style={{ background:`linear-gradient(135deg,${NERDIO_NAVY} 0%,#073d56 100%)`, borderBottom:`2px solid ${NERDIO_BLUE}`, padding:"20px 28px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:40, height:40, borderRadius:10, background:`linear-gradient(135deg,${NERDIO_BLUE},${NERDIO_GREEN})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>👓</div>
              <div>
                <div style={{ fontSize:18, fontWeight:700, color:"#fff", lineHeight:1.1 }}>Microsoft Licensing Navigator</div>
                <div style={{ fontSize:12, color:NERDIO_BLUE, marginTop:2 }}>Powered by Nerdio Intelligence · AVD · W365 · Copilot</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:16 }}>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:11, color:"#94A3B8", marginBottom:2 }}>Users</div>
                <input type="number" value={userCount} onChange={e => setUserCount(Math.max(1, parseInt(e.target.value)||1))}
                  style={{ width:80, background:"#073d56", border:`1px solid ${NERDIO_BLUE}`, color:"#fff", padding:"4px 8px", borderRadius:6, fontSize:14, fontWeight:700, textAlign:"center" }} />
              </div>
              {perUserCost > 0 && (
                <div style={{ background:`linear-gradient(135deg,${NERDIO_BLUE}22,${NERDIO_GREEN}22)`, border:`1px solid ${NERDIO_GREEN}`, borderRadius:10, padding:"8px 14px", textAlign:"center" }}>
                  <div style={{ fontSize:10, color:"#94A3B8" }}>TOTAL / MO</div>
                  <div style={{ fontSize:20, fontWeight:800, color:NERDIO_GREEN }}>${totalMonthlyCost.toLocaleString("en-GB",{maximumFractionDigits:0})}</div>
                  <div style={{ fontSize:10, color:"#94A3B8" }}>${perUserCost.toFixed(2)} / user</div>
                </div>
              )}
            </div>
          </div>

          {/* ── TABS ── */}
          <div style={{ display:"flex", borderBottom:"1px solid #0d3a50", padding:"0 28px", background:"#042838" }}>
            {[
              { id:"builder",   label:"🔧 License Builder" },
              { id:"scenarios", label:"🎯 Use Case Scenarios" },
              { id:"matrix",    label:"📊 License Matrix" },
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ background:"none", border:"none", cursor:"pointer", padding:"12px 18px", fontSize:13, fontWeight: activeTab===tab.id ? 700 : 400, color: activeTab===tab.id ? NERDIO_GREEN : "#94A3B8", borderBottom: activeTab===tab.id ? `2px solid ${NERDIO_GREEN}` : "2px solid transparent", marginBottom:-1, transition:"all 0.15s" }}>{tab.label}</button>
            ))}
            <div style={{ flex:1 }} />
            <button onClick={() => setShowNerdioTips(!showNerdioTips)} style={{ background:"none", border:"none", cursor:"pointer", padding:"12px 14px", fontSize:12, color: showNerdioTips ? NERDIO_BLUE : "#64748B" }}>
              {showNerdioTips ? "🟢" : "⚫"} Nerdio Tips
            </button>
          </div>

          <div style={{ padding:"20px 28px" }}>

            {/* ── BUILDER TAB ── */}
            {activeTab === "builder" && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, maxWidth:1200 }}>
                <div>
                  <SectionHeader title="1. Choose Base License" subtitle="The M365/O365 subscription the customer has or needs" />
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {Object.values(BUNDLES).map(b => (
                      <BundleCard key={b.id} bundle={b} selected={selectedBase===b.id}
                        onSelect={() => setSelectedBase(selectedBase===b.id ? null : b.id)} />
                    ))}
                  </div>
                </div>

                <div>
                  <SectionHeader title="2. Select Add-ons & Services" subtitle="Layer on top of the base license"
                    right={
                      <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                        {CATEGORIES.map(c => (
                          <button key={c} onClick={() => setAddonFilter(c)} style={{ background: addonFilter===c ? NERDIO_BLUE : "#073d56", border:`1px solid ${addonFilter===c ? NERDIO_BLUE : "#0d3a50"}`, color: addonFilter===c ? "#fff" : "#94A3B8", padding:"3px 8px", borderRadius:12, fontSize:11, cursor:"pointer", fontWeight: addonFilter===c ? 700 : 400 }}>{c}</button>
                        ))}
                      </div>
                    }
                  />
                  <div style={{ display:"flex", flexDirection:"column", gap:8, maxHeight:480, overflowY:"auto" }}>
                    {filteredAddons.map(addon => {
                      const eligible = addon.requires.length===0 || (selectedBase && addon.requires.includes(selectedBase));
                      return (
                        <AddonCard key={addon.id} addon={addon} eligible={eligible}
                          checked={selectedAddons.includes(addon.id)} onToggle={() => toggleAddon(addon.id)}
                          showNerdio={showNerdioTips} />
                      );
                    })}
                  </div>

                  {(selectedBase || selectedAddons.length > 0) && (
                    <div style={{ marginTop:16, background:"linear-gradient(135deg,#073d5688,#042838)", border:`1px solid ${NERDIO_BLUE}44`, borderRadius:12, padding:16 }}>
                      <div style={{ fontSize:13, fontWeight:700, color:NERDIO_BLUE, marginBottom:10 }}>📋 Configuration Summary</div>
                      {baseBundle && <SummaryLine label={baseBundle.name} value={`$${baseBundle.monthly.toFixed(2)}/user`} highlight />}
                      {selectedAddons.map(id => {
                        const a = ADDONS.find(x => x.id===id);
                        if (!a) return null;
                        return <SummaryLine key={id} label={`${a.icon} ${a.name}`} value={a.monthly ? `$${a.monthly}/user` : a.unit||"Varies"} />;
                      })}
                      <div style={{ borderTop:"1px solid #0d3a50", marginTop:10, paddingTop:10 }}>
                        <SummaryLine label={`Per user / month (${userCount} users)`} value={`$${perUserCost.toFixed(2)}`} bold />
                        <SummaryLine label="Total monthly (excl. Azure compute)" value={`$${totalMonthlyCost.toLocaleString("en-GB",{maximumFractionDigits:0})}`} highlight bold />
                      </div>

                      {showNerdioTips && nerdioRelevantAddons.length > 0 && (
                        <div style={{ marginTop:12, background:`${NERDIO_GREEN}11`, border:`1px solid ${NERDIO_GREEN}44`, borderRadius:8, padding:10 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:NERDIO_GREEN, marginBottom:6 }}>💡 NERDIO VALUE IN THIS STACK</div>
                          {nerdioRelevantAddons.slice(0,3).map(id => {
                            const a = ADDONS.find(x => x.id===id);
                            return (
                              <div key={id} style={{ fontSize:11, color:"#A7D8E8", marginBottom:4, lineHeight:1.4 }}>
                                <span style={{ color:NERDIO_BLUE }}>→ </span><strong>{a.icon} {a.name}:</strong> {a.nerdio_note}
                              </div>
                            );
                          })}
                        </div>
                      )}

                      <button onClick={() => { setSelectedBase(null); setSelectedAddons([]); setActiveScenario(null); }}
                        style={{ marginTop:12, background:"none", border:"1px solid #C0392B55", color:"#E74C3C", borderRadius:6, padding:"4px 12px", fontSize:11, cursor:"pointer" }}>
                        ✕ Clear All
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ── SCENARIOS TAB ── */}
            {activeTab === "scenarios" && (
              <div style={{ maxWidth:900 }}>
                <SectionHeader title="Use Case Scenarios" subtitle="Common customer situations — click to auto-populate the License Builder" />
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
                  {SCENARIOS.map(s => (
                    <div key={s.id} onClick={() => applyScenario(s)} style={{ background: activeScenario===s.id ? `linear-gradient(135deg,${NERDIO_BLUE}22,${NERDIO_GREEN}11)` : "#073d56", border:`1px solid ${activeScenario===s.id ? NERDIO_GREEN : "#0d3a50"}`, borderRadius:12, padding:16, cursor:"pointer", transition:"all 0.2s" }}>
                      <div style={{ fontSize:22, marginBottom:6 }}>{s.icon}</div>
                      <div style={{ fontSize:15, fontWeight:700, color:"#fff", marginBottom:4 }}>{s.label}</div>
                      <div style={{ fontSize:12, color:"#94A3B8", marginBottom:8 }}>{s.description}</div>
                      <div style={{ fontSize:11, background:"#042838", borderRadius:6, padding:"4px 8px", color:"#64748B", marginBottom:8 }}>
                        🎯 Trigger: <span style={{ color:"#A3B4C4" }}>{s.trigger}</span>
                      </div>
                      <div style={{ fontSize:11, color:"#A7D8E8", lineHeight:1.5, borderTop:`1px solid ${NERDIO_GREEN}33`, paddingTop:8 }}>
                        <span style={{ color:NERDIO_GREEN, fontWeight:700 }}>Nerdio: </span>{s.nerdio_pitch}
                      </div>
                      <div style={{ marginTop:10 }}>
                        <div style={{ fontSize:10, color:"#64748B", marginBottom:4 }}>Recommended stack:</div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                          <span style={{ fontSize:10, background:"#0078D422", color:"#60A5FA", padding:"2px 6px", borderRadius:4 }}>{BUNDLES[s.recommended_base]?.name}</span>
                          {s.recommended_addons.slice(0,4).map(id => {
                            const a = ADDONS.find(x => x.id===id);
                            return a ? <span key={id} style={{ fontSize:10, background:"#1E9DB822", color:NERDIO_BLUE, padding:"2px 6px", borderRadius:4 }}>{a.icon} {a.name.split(" ").slice(0,3).join(" ")}</span> : null;
                          })}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── MATRIX TAB ── */}
            {activeTab === "matrix" && (
              <div style={{ maxWidth:1100 }}>
                <SectionHeader title="License Capability Matrix" subtitle="What each base license includes and enables for AVD, W365, and Copilot" />
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                    <thead>
                      <tr style={{ background:"#073d56" }}>
                        <th style={thStyle("left")}>License</th>
                        <th style={thStyle()}>Price/user/mo</th>
                        <th style={thStyle()}>AVD Rights</th>
                        <th style={thStyle()}>W365 Rights</th>
                        <th style={thStyle()}>Copilot Eligible</th>
                        <th style={thStyle()}>Intune</th>
                        <th style={thStyle()}>Entra ID</th>
                        <th style={thStyle()}>Desktop Apps</th>
                        <th style={thStyle("left")}>Key Notes</th>
                      </tr>
                    </thead>
                    <tbody>
                      {Object.values(BUNDLES).map((b, i) => (
                        <tr key={b.id} style={{ background: i%2===0 ? "#042838" : "#052f47" }}>
                          <td style={tdStyle("left")}>
                            <div style={{ fontWeight:700, color:"#fff" }}>{b.name}</div>
                            <TierBadge t={b.tier} />
                          </td>
                          <td style={tdStyle()}>${b.monthly.toFixed(2)}</td>
                          <td style={tdStyle()}><Tick val={b.avd} /></td>
                          <td style={tdStyle()}><Tick val={b.w365} /></td>
                          <td style={tdStyle()}><Tick val={b.copilot_eligible} /></td>
                          <td style={tdStyle()}><Tick val={["m365_e5","m365_e3","biz_premium","m365_f3"].includes(b.id)} /></td>
                          <td style={tdStyle()}>{b.id==="m365_e5" ? "P2" : ["m365_e3","biz_premium"].includes(b.id) ? "P1" : "Basic"}</td>
                          <td style={tdStyle()}>{["m365_f1","o365_e1"].includes(b.id) ? "❌ Web only" : "✅ Full"}</td>
                          <td style={{ ...tdStyle("left"), color:"#94A3B8", maxWidth:240, fontSize:11, lineHeight:1.4 }}>{b.notes}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div style={{ marginTop:28 }}>
                  <SectionHeader title="Add-on Quick Reference" subtitle="Common add-ons, their cost, and Nerdio relevance" />
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                      <thead>
                        <tr style={{ background:"#073d56" }}>
                          <th style={thStyle("left")}>Add-on</th>
                          <th style={thStyle()}>Category</th>
                          <th style={thStyle()}>Cost/user/mo</th>
                          <th style={thStyle("left")}>Requires</th>
                          {showNerdioTips && <th style={thStyle("left")}>Nerdio Relevance</th>}
                        </tr>
                      </thead>
                      <tbody>
                        {ADDONS.map((a, i) => (
                          <tr key={a.id} style={{ background: i%2===0 ? "#042838" : "#052f47" }}>
                            <td style={tdStyle("left")}><strong style={{ color:"#fff" }}>{a.icon} {a.name}</strong></td>
                            <td style={tdStyle()}>
                              <span style={{ fontSize:10, padding:"2px 6px", borderRadius:10, background:catColor(a.category)+"33", color:catColor(a.category) }}>{a.category}</span>
                            </td>
                            <td style={tdStyle()}>
                              {a.monthly===null ? <span style={{ color:"#94A3B8" }}>Pay-as-you-go</span>
                               : a.monthly===0 ? <span style={{ color:NERDIO_GREEN }}>Included</span>
                               : `$${a.monthly}`}
                            </td>
                            <td style={{ ...tdStyle("left"), color:"#64748B", fontSize:11 }}>
                              {a.requires.length ? a.requires.map(r => BUNDLES[r]?.name||r).join(" or ") : "Any"}
                            </td>
                            {showNerdioTips && (
                              <td style={{ ...tdStyle("left"), color:"#A7D8E8", fontSize:11, lineHeight:1.4 }}>{a.nerdio_note||"—"}</td>
                            )}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* ── FOOTER ── */}
          <div style={{ borderTop:"1px solid #0d3a50", padding:"12px 28px", fontSize:11, color:"#64748B", display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
            <span>Pricing indicative — USD, per user/month, subject to EA/CSP discounts. Azure compute costs are variable and separate.</span>
            <span style={{ color:NERDIO_BLUE }}>Built for Nerdio FSI &amp; Retail territory · Chris Dewhirst · 2026</span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
