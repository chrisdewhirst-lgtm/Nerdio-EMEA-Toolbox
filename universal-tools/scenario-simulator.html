<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Scenario Simulator | Nerdio Sales Command Centre</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #042838;
            color: #FFFFFF;
            line-height: 1.6;
        }

        .top-bar {
            background-color: #042838;
            border-bottom: 2px solid #1E9DB8;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nerdio-logo {
            font-weight: 700;
            font-size: 20px;
            color: #1E9DB8;
            letter-spacing: 1px;
        }

        .top-bar-title {
            font-size: 18px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .home-btn {
            background-color: #1E9DB8;
            color: #FFFFFF;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .home-btn:hover {
            background-color: #16708a;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            gap: 16px;
        }

        .step {
            flex: 1;
            padding: 16px;
            background-color: #0a3a52;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #1E9DB8;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .step.active {
            opacity: 1;
            background-color: #1E9DB8;
            color: #042838;
        }

        .step-number {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .step-name {
            font-size: 12px;
            font-weight: 500;
        }

        .content-area {
            background-color: #0a3a52;
            border-radius: 12px;
            padding: 32px;
            min-height: 500px;
        }

        .competitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .competitor-card {
            background-color: #0f4a64;
            border: 2px solid #1E9DB8;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .competitor-card:hover {
            background-color: #1E9DB8;
            color: #042838;
            transform: translateY(-4px);
        }

        .competitor-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .competitor-name {
            font-weight: 700;
            font-size: 16px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .category-btn {
            background-color: #0f4a64;
            border: 2px solid #1E9DB8;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: #FFFFFF;
            text-align: center;
        }

        .category-btn:hover {
            background-color: #1E9DB8;
            color: #042838;
        }

        .scenario-detail {
            display: none;
        }

        .scenario-detail.active {
            display: block;
        }

        .objection-box {
            background-color: #1E9DB8;
            border-left: 4px solid #CDFF4E;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            color: #042838;
        }

        .objection-label {
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .objection-text {
            font-size: 18px;
            font-weight: 600;
            color: #042838;
        }

        .section {
            margin-bottom: 28px;
        }

        .section-title {
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            color: #CDFF4E;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .section-content {
            background-color: #0f4a64;
            padding: 16px;
            border-radius: 8px;
            border-left: 3px solid #A795C7;
        }

        .rebuttal-structure {
            display: grid;
            gap: 16px;
        }

        .rebuttal-point {
            background-color: #0a3a52;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #1E9DB8;
        }

        .rebuttal-point-label {
            font-weight: 700;
            font-size: 12px;
            color: #CDFF4E;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .rebuttal-point-text {
            font-size: 14px;
            line-height: 1.5;
        }

        .killer-question {
            background-color: #2d1b4e;
            border: 2px dashed #A795C7;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .killer-q-label {
            font-weight: 700;
            font-size: 12px;
            color: #A795C7;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .killer-q-text {
            font-size: 16px;
            font-weight: 600;
            color: #CDFF4E;
            line-height: 1.5;
        }

        .practice-area {
            background-color: #0f4a64;
            padding: 20px;
            border-radius: 8px;
            margin-top: 24px;
        }

        .practice-textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid #1E9DB8;
            border-radius: 6px;
            background-color: #0a3a52;
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            min-height: 120px;
            margin-bottom: 16px;
            resize: vertical;
        }

        .practice-textarea::placeholder {
            color: #6b8fa3;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background-color: #1E9DB8;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background-color: #16708a;
        }

        .btn-secondary {
            background-color: #A795C7;
            color: #FFFFFF;
        }

        .btn-secondary:hover {
            background-color: #8d7ba8;
        }

        .btn-success {
            background-color: #CDFF4E;
            color: #042838;
        }

        .btn-success:hover {
            background-color: #b8e633;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .star-rating {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .star {
            font-size: 24px;
            cursor: pointer;
            color: #6b8fa3;
            transition: color 0.3s;
        }

        .star:hover,
        .star.selected {
            color: #CDFF4E;
        }

        .progress-counter {
            background-color: #1E9DB8;
            color: #042838;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .bookmark-btn {
            background-color: transparent;
            border: 2px solid #CDFF4E;
            color: #CDFF4E;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }

        .bookmark-btn:hover {
            background-color: #CDFF4E;
            color: #042838;
        }

        .bookmark-btn.bookmarked {
            background-color: #CDFF4E;
            color: #042838;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .back-btn,
        .next-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-btn {
            background-color: #0f4a64;
            color: #FFFFFF;
            border: 2px solid #1E9DB8;
        }

        .back-btn:hover {
            background-color: #1E9DB8;
            color: #042838;
        }

        .next-btn {
            background-color: #1E9DB8;
            color: #FFFFFF;
        }

        .next-btn:hover {
            background-color: #16708a;
        }

        .back-btn:disabled,
        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        .evidence-item {
            background-color: #0a3a52;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #CDFF4E;
        }

        .evidence-stat {
            font-weight: 700;
            color: #CDFF4E;
            font-size: 14px;
        }

        .evidence-desc {
            font-size: 13px;
            color: #d0d8e0;
            margin-top: 4px;
        }

        .response-revealed {
            background-color: #0f4a64;
            border: 2px solid #CDFF4E;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }

        @media (max-width: 768px) {
            .step-indicator {
                flex-direction: column;
                gap: 8px;
            }

            .competitor-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .category-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .content-area {
                padding: 20px;
            }
        }
    </style>
<style>
/* === NERDIO BRAND BAR === */
.nerdio-brand-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 99999;
  height: 48px;
  background: linear-gradient(135deg, #0B1B3D 0%, #142952 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.nerdio-brand-bar * { box-sizing: border-box; margin: 0; padding: 0; }
.nerdio-brand-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.nerdio-brand-logo img {
  height: 22px;
  width: auto;
}
.nerdio-brand-divider {
  width: 1px;
  height: 20px;
  background: rgba(255,255,255,0.2);
}
.nerdio-brand-tool-name {
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.nerdio-brand-home {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #00B4D8;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 6px;
  background: rgba(0,180,216,0.1);
  border: 1px solid rgba(0,180,216,0.2);
  transition: all 0.2s;
}
.nerdio-brand-home:hover {
  background: rgba(0,180,216,0.2);
  border-color: rgba(0,180,216,0.4);
  color: #FFFFFF;
}
.nerdio-brand-home svg {
  width: 14px;
  height: 14px;
}
.nerdio-brand-spacer {
  height: 48px;
  width: 100%;
  flex-shrink: 0;
}
/* === END NERDIO BRAND BAR === */
</style>
</head>

                var comp = scenarioData[key];
                html += '<div class="competitor-card" onclick="selectCompetitor(\'' + key + '\')">' +
                    '<div class="competitor-icon">' + comp.icon + '</div>' +
                    '<div class="competitor-name">' + comp.name + '</div>' +
                    '</div>';
            }

            document.getElementById('competitorGrid').innerHTML = html;
        }

        function selectCompetitor(competitorKey) {
            selectedCompetitor = competitorKey;
            renderCategories();
            goToStep(2);
        }

        function renderCategories() {
            var competitor = scenarioData[selectedCompetitor];
            var html = '';

            for (var category in competitor.categories) {
                html += '<button class="category-btn" onclick="selectCategory(\'' + category + '\')">' +
                    category + '</button>';
            }

            document.getElementById('categoryGrid').innerHTML = html;
        }

        function selectCategory(categoryName) {
            selectedCategory = categoryName;
            var scenarios = scenarioData[selectedCompetitor].categories[selectedCategory];
            currentScenarioIndex = 0;
            renderScenario(scenarios[0]);
            goToStep(3);
        }

        function renderScenario(scenario) {
            var html = '<div class="objection-box">' +
                '<div class="objection-label">The Objection:</div>' +
                '<div class="objection-text">' + scenario.objection + '</div>' +
                '</div>';

            html += '<div class="section">' +
                '<div class="section-title">What They Might Say</div>' +
                '<div class="section-content">' + scenario.whatTheySay + '</div>' +
                '</div>';

            html += '<div class="section">' +
                '<div class="section-title">Why They Say It</div>' +
                '<div class="section-content">' + scenario.whyTheySay + '</div>' +
                '</div>';

            html += '<div class="section">' +
                '<div class="section-title">Nerdio Response</div>' +
                '<div class="section-content">' +
                '<div class="rebuttal-structure">' +
                '<div class="rebuttal-point">' +
                '<div class="rebuttal-point-label">Acknowledge</div>' +
                '<div class="rebuttal-point-text">' + scenario.acknowledge + '</div>' +
                '</div>' +
                '<div class="rebuttal-point">' +
                '<div class="rebuttal-point-label">Reframe</div>' +
                '<div class="rebuttal-point-text">' + scenario.reframe + '</div>' +
                '</div>' +
                '<div class="rebuttal-point">' +
                '<div class="rebuttal-point-label">Key Data Points</div>' +
                '<div class="rebuttal-point-text">' + scenario.dataPoints.join('<br>• ') + '</div>' +
                '</div>' +
                '<div class="rebuttal-point">' +
                '<div class="rebuttal-point-label">Recommended Next Step</div>' +
                '<div class="rebuttal-point-text">' + scenario.nextStep + '</div>' +
                '</div>' +
                '</div>' +
                '</div>' +
                '</div>';

            html += '<div class="killer-question">' +
                '<div class="killer-q-label">Killer Question</div>' +
                '<div class="killer-q-text">' + scenario.killerQuestion + '</div>' +
                '</div>';

            html += '<div class="section">' +
                '<div class="section-title">Supporting Evidence</div>' +
                '<div class="section-content">';

            for (var i = 0; i < scenario.evidence.length; i++) {
                html += '<div class="evidence-item">' +
                    '<div class="evidence-stat">' + scenario.evidence[i].stat + '</div>' +
                    '<div class="evidence-desc">' + scenario.evidence[i].desc + '</div>' +
                    '</div>';
            }

            html += '</div></div>';

            document.getElementById('scenarioContent').innerHTML = html;
            updateProgressCounter();
            updateBookmarkButton();
        }

        function updateProgressCounter() {
            var scenarios = scenarioData[selectedCompetitor].categories[selectedCategory];
            var total = getAllScenariosCount();
            var current = currentScenarioIndex + 1;
            document.getElementById('progressCounter').innerHTML = 'Practiced ' + current + ' of ' + total + ' scenarios';
        }

        function getAllScenariosCount() {
            var count = 0;
            var competitor = scenarioData[selectedCompetitor];
            for (var category in competitor.categories) {
                count += competitor.categories[category].length;
            }
            return count;
        }

        function goToPractice() {
            var scenarios = scenarioData[selectedCompetitor].categories[selectedCategory];
            var scenario = scenarios[currentScenarioIndex];

            document.querySelector('#practiceObjection .objection-text').innerHTML = scenario.objection;
            document.getElementById('practiceInput').value = '';
            document.getElementById('bestResponseArea').classList.add('hidden');

            goToStep(4);
        }

        function revealBestResponse() {
            var scenarios = scenarioData[selectedCompetitor].categories[selectedCategory];
            var scenario = scenarios[currentScenarioIndex];

            var html = '<div class="section-title" style="margin-bottom: 12px;">Best Response Structure</div>';
            html += '<div class="rebuttal-structure">' +
                '<div class="rebuttal-point">' +
                '<div class="rebuttal-point-label">Acknowledge</div>' +
                '<div class="rebuttal-point-text">' + scenario.acknowledge + '</div>' +
                '</div>' +
                '<div class="rebuttal-point">' +
                '<div class="rebuttal-point-label">Reframe</div>' +
                '<div class="rebuttal-point-text">' + scenario.reframe + '</div>' +
                '</div>' +
                '<div class="rebuttal-point">' +
                '<div class="rebuttal-point-label">Killer Question</div>' +
                '<div class="rebuttal-point-text">' + scenario.killerQuestion + '</div>' +
                '</div>' +
                '</div>';

            document.getElementById('bestResponseContent').innerHTML = html;
            document.getElementById('bestResponseArea').classList.remove('hidden');

            renderStarRating();
        }

        function renderStarRating() {
            var html = '';
            for (var i = 1; i <= 5; i++) {
                html += '<span class="star" onclick="ratePractice(' + i + ')">★</span>';
            }
            document.getElementById('starRating').innerHTML = html;
        }

        function ratePractice(rating) {
            var stars = document.querySelectorAll('.star');
            for (var i = 0; i < stars.length; i++) {
                if (i < rating) {
                    stars[i].classList.add('selected');
                } else {
                    stars[i].classList.remove('selected');
                }
            }
        }

        function nextScenario() {
            var allScenarios = getAllScenarios();
            currentScenarioIndex = currentScenarioIndex + 1;

            if (currentScenarioIndex >= allScenarios.length) {
                currentScenarioIndex = 0;
            }

            var scenarioKey = allScenarios[currentScenarioIndex];
            var scenario = getScenarioById(scenarioKey);

            renderScenario(scenario);
            goToStep(3);
        }

        function randomScenario() {
            var allScenarios = getAllScenarios();
            currentScenarioIndex = Math.floor(Math.random() * allScenarios.length);
            var scenarioKey = allScenarios[currentScenarioIndex];
            var scenario = getScenarioById(scenarioKey);

            renderScenario(scenario);
        }

        function getAllScenarios() {
            var scenarios = [];
            var competitor = scenarioData[selectedCompetitor];
            for (var category in competitor.categories) {
                var cats = competitor.categories[category];
                for (var i = 0; i < cats.length; i++) {
                    scenarios.push(cats[i].id);
                }
            }
            return scenarios;
        }

        function getScenarioById(id) {
            var competitor = scenarioData[selectedCompetitor];
            for (var category in competitor.categories) {
                var cats = competitor.categories[category];
                for (var i = 0; i < cats.length; i++) {
                    if (cats[i].id === id) {
                        return cats[i];
                    }
                }
            }
            return null;
        }

        function toggleBookmark() {
            var scenarios = scenarioData[selectedCompetitor].categories[selectedCategory];
            var scenario = scenarios[currentScenarioIndex];
            var index = currentBookmarks.indexOf(scenario.id);

            if (index > -1) {
                currentBookmarks.splice(index, 1);
            } else {
                currentBookmarks.push(scenario.id);
            }

            saveData();
            updateBookmarkButton();
        }

        function updateBookmarkButton() {
            var scenarios = scenarioData[selectedCompetitor].categories[selectedCategory];
            var scenario = scenarios[currentScenarioIndex];
            var btn = document.getElementById('bookmarkBtn');

            if (currentBookmarks.indexOf(scenario.id) > -1) {
                btn.classList.add('bookmarked');
                btn.innerHTML = '★ Bookmarked';
            } else {
                btn.classList.remove('bookmarked');
                btn.innerHTML = '☆ Bookmark This';
            }
        }

        function printScenario() {
            var scenarios = scenarioData[selectedCompetitor].categories[selectedCategory];
            var scenario = scenarios[currentScenarioIndex];
            var text = 'SCENARIO: ' + scenario.objection + '\n\n' +
                'WHAT THEY SAY:\n' + scenario.whatTheySay + '\n\n' +
                'WHY THEY SAY IT:\n' + scenario.whyTheySay + '\n\n' +
                'ACKNOWLEDGE:\n' + scenario.acknowledge + '\n\n' +
                'REFRAME:\n' + scenario.reframe + '\n\n' +
                'KILLER QUESTION:\n' + scenario.killerQuestion;

            var element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', 'scenario.txt');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function goToStep(step) {
            currentStep = step;
            updateStepIndicators();
            updateContentArea();
        }

        function goBack() {
            if (currentStep > 1) {
                currentStep = currentStep - 1;
                updateStepIndicators();
                updateContentArea();
            }
        }

        function updateStepIndicators() {
            var steps = document.querySelectorAll('.step');
            for (var i = 0; i < steps.length; i++) {
                steps[i].classList.remove('active');
            }
            document.getElementById('step-' + currentStep).classList.add('active');
        }

        function updateContentArea() {
            var blocks = document.querySelectorAll('.content-block');
            for (var i = 0; i < blocks.length; i++) {
                blocks[i].classList.add('hidden');
            }
            document.getElementById('step-' + currentStep + '-content').classList.remove('hidden');
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Initialize on page load
        window.onload = function() {
            initializeApp();
        };
    </script>
</body>
</html>
