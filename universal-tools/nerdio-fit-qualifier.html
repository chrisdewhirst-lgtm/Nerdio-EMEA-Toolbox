<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nerdio Fit Qualifier</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Nerdio Brand Tokens (from official Brand Guide v1.0) ── */
:root {
  --navy:      #042838;   /* Navy Orbit — 30-50% weighting */
  --white:     #FFFFFF;   /* White Glacier */
  --teal:      #1E9DB8;   /* Nerdio Blue/Teal — 5-25% */
  --green:     #CDFF4E;   /* Green Galaxy — 1-5% accent */
  --purple:    #A795C7;   /* Proton Purple — 1-5% accent */

  /* Derived working palette */
  --navy-90:   rgba(4,40,56,0.92);
  --navy-80:   rgba(4,40,56,0.80);
  --navy-mid:  #0a3a50;
  --navy-lt:   #0d4a63;
  --teal-dk:   #156e80;
  --teal-lt:   #4fb8ce;
  --grey:      #7a9aaa;
  --grey-lt:   #b8cfd8;
  --grey-dk:   #2e5060;

  --font: 'Poppins', sans-serif;
}

html, body { min-height: 100%; background: var(--navy); font-family: var(--font); color: var(--white); }

/* Nerdio-style background — dark navy with subtle teal grid per brand guide */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 80% 0%, rgba(30,157,184,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 0% 100%, rgba(30,157,184,0.08) 0%, transparent 45%),
    linear-gradient(rgba(30,157,184,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30,157,184,0.04) 1px, transparent 1px);
  background-size: auto, auto, 56px 56px, 56px 56px;
  pointer-events: none; z-index: 0;
}

#app { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 0 24px 100px; min-height: 100vh; }

/* ── Nerdio Logo SVG (icon = glasses with power button right lens) ── */
.nerdio-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nerdio-logo-icon { width: 38px; height: 38px; flex-shrink: 0; }
.nerdio-wordmark { font-family: var(--font); font-size: 19px; font-weight: 600; color: var(--white); letter-spacing: 0.5px; }
.nerdio-wordmark span { color: var(--teal); }

/* ── Header ── */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0 18px;
  border-bottom: 1px solid rgba(30,157,184,0.2);
  margin-bottom: 0;
}
.hdr-meta { font-size: 11px; color: var(--grey); letter-spacing: 1px; font-weight: 500; text-transform: uppercase; }
.hdr-right { display: flex; gap: 8px; }

/* ── Buttons ── */
.btn-sm {
  background: transparent;
  border: 1px solid rgba(30,157,184,0.35);
  color: var(--grey-lt); font-size: 10px;
  padding: 7px 14px; border-radius: 6px; cursor: pointer;
  letter-spacing: 1.5px; text-transform: uppercase;
  font-family: var(--font); font-weight: 600;
  transition: border-color .15s, color .15s;
}
.btn-sm:hover { border-color: var(--teal); color: var(--teal-lt); }

/* Primary — Nerdio teal gradient per brand guide gradient #1 */
.btn-primary {
  background: linear-gradient(135deg, var(--teal) 0%, #156e80 100%);
  color: var(--white); border: none; border-radius: 8px;
  padding: 13px 28px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: var(--font);
  transition: opacity .15s, transform .1s;
  letter-spacing: 0.2px;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary.dim { opacity: 0.32; cursor: default; }

.btn-secondary {
  background: transparent; color: var(--grey-lt);
  border: 1px solid rgba(30,157,184,0.3);
  border-radius: 8px; padding: 12px 18px;
  font-size: 13px; cursor: pointer; font-family: var(--font); font-weight: 500;
  transition: border-color .15s;
}
.btn-secondary:hover { border-color: rgba(30,157,184,0.6); }

.btn-ghost {
  background: transparent; color: var(--grey);
  border: none; padding: 12px 0;
  font-size: 13px; cursor: pointer; font-family: var(--font);
}

/* ── Card ── */
.card {
  background: rgba(4,40,56,0.75);
  border: 1px solid rgba(30,157,184,0.22);
  border-radius: 16px; padding: 28px 32px;
  backdrop-filter: blur(12px);
}

/* ── Progress ── */
.prog-wrap { height: 3px; background: rgba(30,157,184,0.15); border-radius: 2px; margin: 20px 0 6px; overflow: hidden; }
/* Nerdio gradient #1: teal → green */
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--green)); border-radius: 2px; transition: width .4s ease; }
.prog-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--grey); margin-bottom: 20px; font-weight: 500; letter-spacing: 0.5px; }

/* ── Question labels ── */
.q-eyebrow {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--teal); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px; font-weight: 600;
}
.q-title  { font-size: 19px; font-weight: 700; color: var(--white); margin-bottom: 6px; line-height: 1.35; }
.q-sub    { font-size: 13px; color: var(--grey); margin-bottom: 18px; font-weight: 400; line-height: 1.5; }
.q-hint   { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 14px; font-weight: 600; }

/* ── Priority badge (1–5) used on ranking questions ── */
.priority-mode-note {
  background: rgba(30,157,184,0.1);
  border: 1px solid rgba(30,157,184,0.25);
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: var(--teal-lt);
  margin-bottom: 16px; font-weight: 500;
}

/* ── Options ── */
.opts { display: grid; gap: 8px; }
.opts.two-col { grid-template-columns: 1fr 1fr; }

.opt {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px;
  background: rgba(10,58,80,0.5);
  border: 1.5px solid rgba(30,157,184,0.18);
  border-radius: 10px; cursor: pointer;
  text-align: left; width: 100%;
  transition: background .15s, border-color .15s;
  font-family: var(--font);
  position: relative;
}
.opt:hover { background: rgba(30,157,184,0.1); border-color: rgba(30,157,184,0.45); }
.opt.selected { background: rgba(30,157,184,0.14); border-color: var(--teal); }
.opt.priority-active { border-color: var(--green); background: rgba(205,255,78,0.07); }

.opt-icon  { font-size: 17px; min-width: 24px; text-align: center; margin-top: 2px; flex-shrink: 0; }
.opt-body  { flex: 1; min-width: 0; }
.opt-label { font-size: 13px; font-weight: 600; color: var(--white); line-height: 1.3; }
.opt.selected .opt-label, .opt.priority-active .opt-label { color: var(--teal-lt); }
.opt-sub   { font-size: 11px; color: var(--grey); margin-top: 3px; line-height: 1.45; }

/* Standard checkbox / radio */
.opt-check {
  width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px;
  border: 2px solid var(--grey-dk);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--navy);
  background: transparent;
  transition: background .15s, border-color .15s;
}
.opt-check.sq { border-radius: 5px; }
.opt-check.ci { border-radius: 10px; }
.opt.selected .opt-check { background: var(--teal); border-color: var(--teal); }

/* Priority picker — shown after selecting on rank-type questions */
.priority-picker {
  display: none; align-items: center; gap: 4px; margin-top: 8px;
  flex-wrap: wrap;
}
.opt.selected .priority-picker,
.opt.priority-active .priority-picker { display: flex; }

.prio-label { font-size: 10px; color: var(--teal); letter-spacing: 1px; font-weight: 600; margin-right: 4px; }
.prio-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid rgba(30,157,184,0.35);
  background: rgba(10,58,80,0.6);
  color: var(--grey-lt); font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.prio-btn:hover { border-color: var(--teal); color: var(--teal-lt); }
.prio-btn.active { background: var(--green); border-color: var(--green); color: var(--navy); }

/* Priority badge visible on collapsed state */
.prio-badge {
  position: absolute; top: 10px; right: 12px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--green); color: var(--navy);
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}

/* ── Nav row ── */
.nav-row { display: flex; gap: 10px; margin-top: 22px; align-items: center; }
.nav-row .btn-primary { flex: 1; text-align: center; }

/* ── Dot trail ── */
.dot-trail { display: flex; gap: 5px; justify-content: center; margin-top: 16px; }
.dot-trail button {
  height: 7px; border-radius: 4px;
  background: rgba(46,80,96,0.6); border: none; cursor: pointer; padding: 0;
  transition: all .2s;
}
.dot-trail button.active  { width: 22px; background: var(--teal); }
.dot-trail button.done    { width: 7px; background: rgba(30,157,184,0.45); }
.dot-trail button:not(.active):not(.done) { width: 7px; }

/* ── Jump panel ── */
.jump-panel {
  background: rgba(4,40,56,0.95);
  border: 1px solid rgba(30,157,184,0.28);
  border-radius: 12px; padding: 18px 20px;
  margin: 10px 0; backdrop-filter: blur(10px);
}
.jump-eyebrow { font-size: 10px; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; }
.jump-dots { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.jump-dot {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: var(--font); border: 1.5px solid rgba(46,80,96,0.6);
  background: rgba(13,74,99,0.5); color: var(--grey);
  transition: all .15s;
}
.jump-dot.active { background: var(--teal); color: var(--navy); border-color: var(--teal); }
.jump-dot.done   { background: rgba(30,157,184,0.18); color: var(--teal-lt); border-color: rgba(30,157,184,0.4); }
.jump-names { display: flex; flex-wrap: wrap; gap: 6px 16px; }
.jump-names button { background: none; border: none; color: var(--grey); font-size: 11px; cursor: pointer; font-family: var(--font); font-weight: 500; }
.jump-names button:hover, .jump-names button.cur { color: var(--teal-lt); }

/* ── Fade transition ── */
.fade-wrap { transition: opacity .2s, transform .2s; }
.fade-wrap.out { opacity: 0; transform: translateY(8px); }

/* ── INTRO PAGE ── */
.intro-wrap { display: flex; flex-direction: column; align-items: center; padding: 48px 0 30px; }
.intro-card { max-width: 700px; width: 100%; text-align: center; }
.intro-bigicon { font-size: 52px; margin-bottom: 18px; }
.intro-h1 {
  font-size: 30px; font-weight: 800; line-height: 1.2;
  margin-bottom: 10px;
  /* Nerdio heading style: white with teal accent word */
}
.intro-h1 em { color: var(--teal); font-style: normal; }
.intro-p { font-size: 15px; color: var(--grey-lt); max-width: 540px; margin: 0 auto 12px; line-height: 1.65; font-weight: 400; }
.intro-timing { font-size: 11px; color: var(--teal); margin-bottom: 32px; letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase; }

/* Nerdio feature tiles */
.intro-tiles { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 32px; text-align: left; }
.intro-tile {
  background: rgba(13,58,80,0.45);
  border: 1px solid rgba(30,157,184,0.2);
  border-radius: 12px; padding: 16px;
  transition: border-color .2s;
}
.intro-tile:hover { border-color: rgba(30,157,184,0.45); }
.intro-tile-icon { font-size: 22px; margin-bottom: 10px; }
.intro-tile-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.intro-tile-sub   { font-size: 11px; color: var(--grey); line-height: 1.45; }

/* Green galaxy accent line — from brand guide */
.intro-accent { width: 48px; height: 3px; background: var(--green); border-radius: 2px; margin: 0 auto 24px; }
.intro-note { font-size: 11px; color: var(--grey-dk); margin-top: 16px; }

/* ── RESULTS PAGE ── */
/* Verdict banner */
.verdict-banner {
  border-radius: 14px; padding: 22px 26px; margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 18px;
  border: 2px solid;
}
.v-icon {
  width: 50px; height: 50px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; font-family: var(--font);
}
.v-body { flex: 1; }
.v-eyebrow { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
.v-headline { font-size: 20px; font-weight: 700; color: var(--white); margin-bottom: 6px; line-height: 1.3; }
.v-summary  { font-size: 13px; color: var(--grey-lt); line-height: 1.6; font-weight: 400; }
.v-badge {
  border-radius: 8px; padding: 8px 16px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  white-space: nowrap; flex-shrink: 0; align-self: flex-start;
  text-transform: uppercase; font-family: var(--font);
}

/* Platform scores */
.r-eyebrow { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 16px; }
.score-row { margin-bottom: 12px; }
.score-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
.score-name { font-size: 13px; font-weight: 500; color: var(--grey-lt); }
.score-name.nerdio { font-weight: 700; color: var(--teal-lt); }
.score-pct  { font-size: 13px; font-weight: 700; color: var(--grey); }
.score-pct.top { color: var(--teal); }
.bar-bg   { height: 7px; background: rgba(13,58,80,0.8); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .9s ease .1s; }

/* Signals */
.signals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.sig-col { display: flex; flex-direction: column; gap: 12px; }
.sig-panel { border-radius: 12px; padding: 18px 20px; border: 1px solid; }
.sig-ey { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
.sig-list { display: flex; flex-direction: column; gap: 10px; }
.sig-item { border-left: 3px solid; padding-left: 12px; }
.sig-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.sig-body  { font-size: 12px; color: var(--grey); line-height: 1.55; font-weight: 400; }

/* Priority context in signals */
.sig-prio { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 1px;
  background: rgba(205,255,78,0.15); color: var(--green); border: 1px solid rgba(205,255,78,0.3);
  border-radius: 20px; padding: 2px 8px; margin-bottom: 4px; text-transform: uppercase; }

/* Steps */
.steps-panel { border-radius: 12px; padding: 20px 22px; margin-bottom: 14px; border: 1px solid; }
.steps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.step-card { background: rgba(13,58,80,0.45); border: 1px solid rgba(30,157,184,0.18); border-radius: 10px; padding: 14px; }
.step-top  { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: flex-start; }
.step-icon { font-size: 18px; }
.step-tag  { font-size: 10px; letter-spacing: 1px; border-radius: 20px; padding: 3px 10px; border: 1px solid; white-space: nowrap; font-weight: 600; }
.step-title { font-size: 13px; font-weight: 700; color: var(--white); margin-bottom: 5px; }
.step-body  { font-size: 11px; color: var(--grey); line-height: 1.55; font-weight: 400; }

/* Summary */
.sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.sum-item { padding: 8px 0; border-bottom: 1px solid rgba(13,58,80,0.8); }
.sum-label { font-size: 10px; color: var(--grey); margin-bottom: 2px; font-weight: 500; letter-spacing: 0.5px; }
.sum-val   { font-size: 12px; color: var(--grey-lt); font-weight: 400; }

/* Nerdio "power strip" accent at bottom — brand graphic element */
.nerdio-strip {
  display: flex; align-items: center; gap: 16px;
  background: linear-gradient(135deg, rgba(13,58,80,0.7) 0%, rgba(21,110,128,0.3) 100%);
  border: 1px solid rgba(30,157,184,0.25);
  border-radius: 10px; padding: 16px 22px; margin-bottom: 14px;
}
.ns-icon { font-size: 22px; }
.ns-title { font-size: 12px; font-weight: 700; color: var(--teal-lt); margin-bottom: 3px; }
.ns-body  { font-size: 11px; color: var(--grey); line-height: 1.5; font-weight: 400; }
.ns-link  { font-size: 11px; color: var(--teal); font-weight: 600; margin-top: 4px; }

/* ── Misc ── */
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }
.hidden { display: none !important; }

/* ── Severity Matrix ── */
.sev-table { width: 100%; border-collapse: collapse; }
.sev-header { display: grid; grid-template-columns: 1fr 100px 100px 100px; gap: 0; margin-bottom: 8px; padding: 0 0 6px; border-bottom: 1px solid rgba(30,157,184,0.15); }
.sev-header-cell { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }
.sev-header-cell:first-child { text-align: left; color: var(--grey); }
.sev-header-cell.h-none  { color: var(--grey-dk); }
.sev-header-cell.h-some  { color: #f59e0b; }
.sev-header-cell.h-major { color: #ff6b6b; }

.sev-row { display: grid; grid-template-columns: 1fr 100px 100px 100px; gap: 0; padding: 7px 0; border-bottom: 1px solid rgba(10,58,80,0.6); align-items: center; transition: background .12s; border-radius: 6px; }
.sev-row:hover { background: rgba(30,157,184,0.04); }
.sev-row:last-child { border-bottom: none; }

.sev-label { display: flex; align-items: flex-start; gap: 10px; padding-right: 12px; }
.sev-label-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.sev-label-text { }
.sev-label-title { font-size: 13px; font-weight: 600; color: var(--white); line-height: 1.2; }
.sev-label-sub   { font-size: 11px; color: var(--grey); margin-top: 2px; line-height: 1.35; }

.sev-cell { display: flex; align-items: center; justify-content: center; }
.sev-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1.5px solid rgba(46,80,96,0.6);
  background: rgba(10,58,80,0.4);
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .14s; font-family: var(--font);
  color: transparent; position: relative;
}
.sev-btn::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: rgba(46,80,96,0.5); }
.sev-btn:hover { border-color: rgba(30,157,184,0.5); }
.sev-btn:hover::after { background: rgba(30,157,184,0.4); }
.sev-btn.active-none  { background: rgba(122,154,170,0.15); border-color: var(--grey); }
.sev-btn.active-none::after  { background: var(--grey); width: 10px; height: 10px; }
.sev-btn.active-some  { background: rgba(245,158,11,0.12); border-color: #f59e0b; }
.sev-btn.active-some::after  { background: #f59e0b; width: 10px; height: 10px; }
.sev-btn.active-major { background: rgba(255,107,107,0.12); border-color: #ff6b6b; }
.sev-btn.active-major::after { background: #ff6b6b; width: 12px; height: 12px; }

/* Row highlight when something is selected */
.sev-row.has-rating .sev-label-title { color: var(--teal-lt); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--teal-dk); border-radius: 3px; }
</style>
<style>
/* === NERDIO BRAND BAR === */
.nerdio-brand-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 99999;
  height: 48px;
  background: linear-gradient(135deg, #0B1B3D 0%, #142952 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.nerdio-brand-bar * { box-sizing: border-box; margin: 0; padding: 0; }
.nerdio-brand-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.nerdio-brand-logo img {
  height: 22px;
  width: auto;
}
.nerdio-brand-divider {
  width: 1px;
  height: 20px;
  background: rgba(255,255,255,0.2);
}
.nerdio-brand-tool-name {
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.nerdio-brand-home {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #00B4D8;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;

<style>
#nerdio-auth-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #0B1B3D 0%, #122a5c 50%, #0B1B3D 100%);
    z-index: 999999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
#nerdio-auth-overlay.hidden { display: none; }
.nerdio-auth-box {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.nerdio-auth-box .auth-icon {
    width: 64px; height: 64px;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, #00B4D8, #00C48C);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
}
.nerdio-auth-box .auth-icon svg { width: 32px; height: 32px; }
.nerdio-auth-box h2 {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 8px;
}
.nerdio-auth-box p {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    margin: 0 0 28px;
}
.nerdio-auth-box input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
}
.nerdio-auth-box input[type="password"]::placeholder { color: rgba(255,255,255,0.35); }
.nerdio-auth-box input[type="password"]:focus { border-color: #00B4D8; }
.nerdio-auth-box .auth-btn {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    background: linear-gradient(135deg, #00B4D8, #00C48C);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
}
.nerdio-auth-box .auth-btn:hover { opacity: 0.9; }
.nerdio-auth-box .auth-btn:active { transform: scale(0.98); }
.nerdio-auth-box .auth-error {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    display: none;
}
.nerdio-auth-box .auth-footer {
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    margin-top: 24px;
}
</style>
<div id="nerdio-auth-overlay">
    <div class="nerdio-auth-box">
        <div class="auth-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
        </div>
        <h2>EMEA Nerdio Toolbox</h2>
        <p>Enter the team password to continue</p>
        <form id="nerdio-auth-form" onsubmit="return nerdioAuth()">
            <input type="password" id="nerdio-auth-pwd" placeholder="Team password" autofocus>
            <button type="submit" class="auth-btn">Unlock Toolbox</button>
            <div class="auth-error" id="nerdio-auth-error">Incorrect password. Please try again.</div>
        </form>
        <div class="auth-footer">Nerdio EMEA &mdash; Internal Use Only</div>
    </div>
</div>
<script>
(function(){
    var AUTH_KEY = 'nerdio-emea-auth';
    var HASH = '8d4fc32913788be20e3ed56e0e9598b490bc0a8023036548b73715eca41d80d0';
    async function sha256(str) {
        var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
    }
    if (sessionStorage.getItem(AUTH_KEY) === 'true') {
        document.getElementById('nerdio-auth-overlay').classList.add('hidden');
    }
    window.nerdioAuth = async function() {
        var pwd = document.getElementById('nerdio-auth-pwd').value;
        var hash = await sha256(pwd);
        if (hash === HASH) {
            sessionStorage.setItem(AUTH_KEY, 'true');
            document.getElementById('nerdio-auth-overlay').classList.add('hidden');
        } else {
            document.getElementById('nerdio-auth-error').style.display = 'block';
            document.getElementById('nerdio-auth-pwd').value = '';
            document.getElementById('nerdio-auth-pwd').focus();
        }
        return false;
    };
})();
</script>

/* ── State ── */
const state = {
  step: "intro",   // intro | questions | results
  currentQ: 0,
  answers: {},     // { [qId]: string | string[] | {id:string, priority:number}[] }
  priorities: {},  // { [qId]: { [optId]: number } }
  showJump: false,
};

/* ── Helpers ── */
function getSelectedIds(qId) {
  const v = state.answers[qId];
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return [v];
}
function getPriority(qId, optId) {
  return (state.priorities[qId] || {})[optId] || 0;
}
function countAnswered() {
  return Object.keys(state.answers).filter(k => {
    const q = QUESTIONS.find(x => x.id === k);
    const v = state.answers[k];
    if (q && q.type === "severity") return Object.values(v||{}).some(s => s==="some"||s==="major");
    return Array.isArray(v) ? v.length > 0 : !!v;
  }).length;
}
function isQAnswered(qId) {
  const q = QUESTIONS.find(x => x.id === qId);
  if (!q) return false;
  if (q.type === "severity") {
    const v = state.answers[qId] || {};
    return Object.values(v).some(s => s === "some" || s === "major");
  }
  const v = state.answers[qId];
  return Array.isArray(v) ? v.length > 0 : !!v;
}

/* ── Transition ── */
function fade(fn) {
  const el = document.querySelector(".fade-wrap");
  if (el) el.classList.add("out");
  setTimeout(() => { fn(); render(); }, 200);
}

/* ── Scoring engine (Nerdio-only content) ── */
function scoreAnswers(answers, priorities) {
  let nScore = 0;
  const signals = { positive: [], caution: [], disqualify: [] };
  let verdict = "good";

  const platform  = answers.platform  || [];
  const scale     = answers.scale     || "";
  const cloud     = answers.cloud     || "";
  const driver    = answers.driver    || "";
  const pain      = answers.pain      || {};  // {cost_waste:"major", broken_hosts:"some", ...}
  const microsoft = answers.microsoft || "";
  const timeline  = answers.timeline  || "";
  const blockers  = answers.blockers  || [];

  const platPrio  = {};  // platform is now multi (no priority)
  const blocPrio  = {};  // blockers is now multi (no priority)

  // Helper — severity helpers
  function isMajor(id) { return pain[id] === "major"; }
  function isSome(id)  { return pain[id] === "some"; }
  function isAny(id)   { return pain[id] === "major" || pain[id] === "some"; }
  function sevLabel(id) { return pain[id] === "major" ? " — Major Pain" : pain[id] === "some" ? " — Sometimes" : ""; }

  /* ── Scale ── */
  if (scale === "under100")   { nScore -= 8;  signals.caution.push("Scale — under 100 users:Nerdio delivers value at any size, but the auto-scaling ROI payback is most compelling above 200 users. For smaller deployments, the operational automation gains (image management, Scripted Actions, unified console) often drive the case more than compute savings."); }
  if (scale === "100_500")    { nScore += 8;  signals.positive.push("Scale — 100–500 users:Nerdio delivers meaningful ROI at this size. Auto-scaling savings of 30–55% on Azure compute, plus image automation and reduced admin overhead, typically provide clear payback within the first quarter of deployment."); }
  if (scale === "500_2000")   { nScore += 16; signals.positive.push("Scale — 500–2,000 users:Strong Nerdio ROI territory. Azure compute savings at this scale are significant, and operational automation across host pool management, image lifecycle, and Intune Insights frees meaningful IT capacity."); }
  if (scale === "2000_10000") { nScore += 22; signals.positive.push("Scale — 2,000–10,000 users:Enterprise scale. Nerdio's patented auto-scaling, multi-region support, and Scripted Actions automation deliver compounding returns across this user base. Azure spend reduction of 55–80% is well-documented at this scale."); }
  if (scale === "over10000")  { nScore += 28; signals.positive.push("Scale — 10,000+ users:Maximum ROI territory. Nerdio is purpose-built to scale here — multi-region host pool management, Azure API Limit Booster, and enterprise-grade RBAC. Compute savings at this scale significantly exceed the licence investment."); }

  /* ── Cloud ── */
  if (cloud === "azure_primary")  { nScore += 20; signals.positive.push("Azure as primary cloud:Perfect architectural fit. Nerdio Manager deploys as an Azure App Service inside your own subscription — no data leaves your tenancy. Full access to Reserved Instance and Azure Hybrid Benefit pricing on top of Nerdio's auto-scaling."); }
  if (cloud === "azure_macc")     { nScore += 26; signals.positive.push("Azure Consumption Commitment (MACC) in place:Critical commercial advantage. Nerdio is available on Azure Marketplace, meaning your subscription draws down against your existing MACC commitment. No new budget line — spend comes from already-committed Azure funds. This is often the fastest path to procurement approval."); }
  if (cloud === "azure_some")     { nScore += 10; signals.caution.push("Mixed cloud environment:Nerdio addresses your Azure workloads specifically. Where you have AVD or Windows 365 running in Azure, Nerdio applies fully. Size the applicable ROI based on the proportion of workloads in Azure — the case is proportionally strong."); }
  if (cloud === "azure_starting") { nScore -= 5;  signals.caution.push("Early Azure journey:Nerdio compounds in value as your Azure footprint grows. It's worth deploying alongside the initial AVD buildout — Nerdio's deployment wizard significantly reduces the time to get the first host pool live. Sequence it as part of the foundation, not a follow-on."); }
  if (cloud === "azure_gov")      { nScore += 15; signals.positive.push("Azure Government / Sovereign Cloud:Nerdio Manager for MSP supports Azure Government and GCC High clouds. For NME (enterprise), confirm current government cloud region support directly with the Nerdio team for your specific Azure Gov instance."); }

  /* ── Driver ── */
  if (driver === "cost")       { nScore += 20; signals.positive.push("Cost reduction is the primary driver:Nerdio's strongest quantified proof point. Patented auto-scaling delivers up to 80% reduction in Azure compute spend (55% average). Nerdio powers down unused session hosts in real time and pre-scales before demand — so users never notice savings happening."); }
  if (driver === "migration")  { nScore += 18; signals.positive.push("Migrating off a legacy VDI platform:Nerdio accelerates the transition to AVD significantly. The NME deployment wizard gets a target environment live in hours. Migration tools automate the heavy lifting of moving from Citrix or Omnissa. Customers have completed migrations in weeks that were expected to take months."); }
  if (driver === "ops")        { nScore += 18; signals.positive.push("Reducing IT operational complexity:Nerdio replaces the multi-console AVD management experience with a single, purpose-built interface. Auto-Heal detects and remediates broken session hosts automatically. Scripted Actions automate repetitive tasks. Image lifecycle management adds version control and staged rollouts. What once took hours per week takes minutes."); }
  if (driver === "security")   { nScore += 14; signals.positive.push("Security and compliance posture:Nerdio deploys CIS Benchmark-aligned Intune baselines and automated compliance enforcement. All data stays in your own Azure subscription — Nerdio is agentless and never touches user data. Role-based access control (RBAC) is granular and auditable."); }
  if (driver === "scale_fast") { nScore += 16; signals.positive.push("Rapid deployment and scaling:Nerdio's guided deployment wizard takes a new AVD environment from zero to live in under an hour. Scripted Actions make subsequent environment builds repeatable and error-free. Scaling existing environments takes minutes, not days."); }
  if (driver === "w365")       { nScore += 14; signals.positive.push("Windows 365 adoption and management:NME 7.0 introduced comprehensive Windows 365 management — provisioning, resizing, licence tracking, and a TCO modelling tool to right-size users between Cloud PC and AVD based on actual usage patterns and cost."); }
  if (driver === "msp")        { nScore += 22; signals.positive.push("MSP managed desktop practice:Nerdio Manager for MSP (NMM) is the purpose-built platform. Multi-tenant dashboard, delegated administration, white-label support, automated billing via CSP, and cost estimator tool. The Partnerd programme provides significant licence discounts as practice volume grows."); }
  if (driver === "visibility")  { nScore += 14; signals.positive.push("Unified endpoint visibility:Nerdio's single pane of glass covers AVD, Windows 365, and Intune-managed devices from one console. Intune Insights transforms complex Intune data into automated, scheduled reports — no manual KQL, no stale exports. IT teams gain visibility they simply cannot get from native Microsoft tooling."); }

  /* ── Challenges (severity: "some" | "major") ── */
  if (isAny("cost_waste")) {
    nScore += isMajor("cost_waste") ? 18 : 10;
    signals.positive.push(`Azure compute spend${sevLabel("cost_waste")}:This is the fastest ROI proof point in any Nerdio evaluation. Auto-scaling powers down idle session hosts automatically and spins them back up before demand hits — users see no difference, but Azure bills drop 55–80%. A 2-week pilot on a single host pool typically proves the entire business case.`);
  }
  if (isAny("broken_hosts")) {
    nScore += isMajor("broken_hosts") ? 15 : 8;
    signals.positive.push(`Session host reliability${sevLabel("broken_hosts")}:Nerdio's Auto-Heal sequence monitors session host health and automatically detects, remediates, and if needed, rebuilds broken hosts. The helpdesk ticket for 'user cannot connect' is one of the most common AVD issues — and one of the first to disappear after Nerdio deployment.`);
  }
  if (isAny("image_mgmt")) {
    nScore += isMajor("image_mgmt") ? 12 : 6;
    signals.positive.push(`Image & patch management${sevLabel("image_mgmt")}:Nerdio's golden image workflow adds version control, staged deployment, and one-click rollback to the AVD image lifecycle. Image updates that previously required manual processes and late-night maintenance windows become routine, audited operations.`);
  }
  if (isAny("console_chaos")) {
    nScore += isMajor("console_chaos") ? 10 : 5;
    signals.positive.push(`Management tool sprawl${sevLabel("console_chaos")}:Nerdio replaces the Azure portal, native AVD console, and Intune management silos with a single purpose-built interface. Admins stop context-switching between tools and gain a consistent workflow for all Microsoft cloud desktop operations.`);
  }
  if (isAny("slow_deploy")) {
    nScore += isMajor("slow_deploy") ? 12 : 6;
    signals.positive.push(`Slow provisioning${sevLabel("slow_deploy")}:A new AVD host pool that takes days to provision manually through Azure can be live in under an hour using Nerdio's guided deployment wizard. Scripted Actions make subsequent deployments repeatable — junior team members can execute them reliably.`);
  }
  if (isAny("intune_blind")) {
    nScore += isMajor("intune_blind") ? 10 : 5;
    signals.positive.push(`Intune visibility${sevLabel("intune_blind")}:Nerdio's Intune Insights module transforms raw Intune telemetry into actionable dashboards and automated scheduled reports. Device compliance, patching status, and app deployment coverage become visible in real time — not in quarterly exports.`);
  }
  if (isAny("w365_complexity")) {
    nScore += isMajor("w365_complexity") ? 12 : 6;
    signals.positive.push(`Windows 365 at scale${sevLabel("w365_complexity")}:NME 7.0 provides full lifecycle management for Windows 365 Cloud PCs — provisioning, resizing, licence tracking, and migration tooling between AVD and W365. The TCO Analyser helps right-size the mix based on real usage data.`);
  }
  if (isAny("msp_margin")) {
    nScore += isMajor("msp_margin") ? 16 : 8;
    signals.positive.push(`MSP margin pressure${sevLabel("msp_margin")}:NMM's auto-scaling reduces the Azure compute cost that erodes MSP margins. The Cost Estimator tool enables accurate, profitable quoting. The Partnerd programme provides licence discounts that improve NMM unit economics as practice volume grows.`);
  }

  /* ── Microsoft direction ── */
  if (microsoft === "all_in_avd")    { nScore += 22; signals.positive.push("Committed to Azure Virtual Desktop:Highest-confidence Nerdio scenario. The platform decision is made — Nerdio is the management layer purpose-built for AVD. Deployment can begin on a free 30-day trial from Azure Marketplace today."); }
  if (microsoft === "avd_w365_mix")  { nScore += 18; signals.positive.push("AVD and Windows 365 together:Nerdio manages both from a single console. The NME TCO Analyser right-sizes which users belong on AVD vs. Windows 365 based on actual usage and cost — then helps you execute the migration between them if needed."); }
  if (microsoft === "moving_to_avd") { nScore += 20; signals.positive.push("Planning the move to AVD:Strong Nerdio use case. The migration wizard automates the heavy lifting from Citrix or Omnissa. Nerdio deploys the AVD target environment in hours, runs parallel operation during the transition, and provides a structured cutover path."); }
  if (microsoft === "w365_primary")  { nScore += 14; signals.positive.push("Windows 365 as primary target:Nerdio NME 7.0 is specifically built for this. W365 provisioning, resizing, licence management, and performance visibility — all in one place. The TCO Analyser helps validate the cost model before and during rollout."); }
  if (microsoft === "uncertain")     { nScore += 4;  signals.caution.push("Microsoft platform direction unclear:The platform decision should ideally be resolved before Nerdio goes deep in evaluation. If the outcome lands on AVD or Windows 365 — which it does for the majority of organisations evaluating cloud desktops in 2025 — Nerdio is the natural next conversation. Start with the free AVD Modeler tool to quantify the cost case."); }
  if (microsoft === "non_ms") {
    nScore -= 35;
    signals.disqualify.push("Confirmed long-term commitment to a non-Microsoft platform:Nerdio Manager is purpose-built for Microsoft Azure Virtual Desktop and Windows 365. If the organisation has made a firm strategic decision to remain on Citrix DaaS or Omnissa as the long-term desktop delivery platform — not as a migration source — Nerdio is not the right fit at this time. Revisit if the platform strategy changes.");
    verdict = "poor";
  }

  /* ── Timeline ── */
  if (timeline === "now")      { signals.positive.push("Active decision within 60 days:The free 30-day trial on Azure Marketplace is the right immediate action. Nerdio is deployed into your own Azure subscription at zero cost — captures real baseline data and enables a live comparison before the commercial conversation closes."); }
  if (timeline === "contract") { signals.positive.push("Contract-renewal triggered:Optimal timing. Citrix and Omnissa renewal windows are the moment when the total cost comparison is most compelling and organisational motivation to move is highest. A Nerdio proof of value takes 4 to 6 weeks — plan to have results before the renewal deadline."); }
  if (timeline === "long")     { signals.caution.push("12+ months horizon:No immediate urgency — but every month without Nerdio's auto-scaling is measurable Azure spend that accumulates. Consider running the free AVD Cost Modeler (nmeadvisor.getnerdio.com) now to quantify the case, so the business case is ready when budget planning opens."); }
  if (timeline === "h2")       { signals.positive.push("3 to 6 month window:Good evaluation timeline. Enough time to run a structured proof of value (typically 4 to 6 weeks), build a data-backed business case, and complete procurement. Consider starting the free trial now to capture baseline Azure cost data in advance."); }

  /* ── Blockers ── */
  if (blockers.includes("budget_frozen")) {
    if (cloud === "azure_macc") {
      nScore += 8;
      signals.positive.push("Budget frozen — MACC in place (mitigated):Azure Marketplace purchases draw down against your existing MACC commitment. No new budget request required — the spend comes from Azure funds you have already committed. This is the most common path to procurement approval when discretionary budgets are locked.");
    } else {
      signals.caution.push("Budget constrained:If an Azure Consumption Commitment exists, Nerdio via Azure Marketplace draws from that committed spend — no new budget line needed. If not, the Azure compute savings that Nerdio generates from day one typically justify the investment within the first month. A cost-neutral framing is often the right approach.");
    }
  }
  if (blockers.includes("contract_lock")) {
    signals.caution.push("Existing vendor contract:Identify the renewal date and work backwards. A Nerdio proof of value takes 4 to 6 weeks. Aim to have completed the evaluation and business case at least 3 months before the renewal decision point — that is the window where the comparison has maximum commercial leverage.");
  }
  if (blockers.includes("gov_proc")) {
    signals.caution.push("Government procurement rules:Nerdio is available on Azure Marketplace, which is an approved procurement route in many government frameworks. Check current Nerdio availability on G-Cloud, Crown Commercial Service, or your relevant national framework. Engage the Nerdio public sector team directly for framework-specific guidance.");
  }
  if (blockers.includes("no_azure_mgmt")) {
    signals.caution.push("Limited Azure internal expertise:Nerdio is specifically designed to close this skills gap. The deployment wizard, Scripted Actions library, and guided host pool configuration are built for IT professionals who manage AVD without deep Azure engineering backgrounds. Nerdio's onboarding and Customer Success programmes accelerate the team's capability alongside the deployment.");
  }
  if (blockers.includes("multi_cloud")) {
    signals.caution.push("Multi-cloud requirement:Nerdio addresses the Azure portion of your desktop estate. Where AVD or Windows 365 is in scope, Nerdio applies fully — size the ROI based on that portion. Non-Azure endpoints and workloads are outside Nerdio's scope.");
  }
  if (blockers.includes("no_blockers")) {
    nScore += 8;
    signals.positive.push("No significant blockers:Clean evaluation path. The recommended immediate action is the free 30-day Nerdio trial on Azure Marketplace — gets the platform live in your own environment before commercial discussions complete, and starts capturing baseline Azure cost data for the business case.");
  }

  /* ── Legacy platform signals ── */
  if (platform.includes("citrix")) {
    nScore += 4;
    signals.positive.push(`Citrix in current estate:Nerdio includes a Citrix-to-AVD migration pathway. The competitive comparison is primarily economic — Citrix licensing on Azure versus Nerdio's per-user pricing. Multiple customers have completed Citrix-to-AVD migrations using Nerdio and reported significant cost reductions from removing the Citrix licence layer. When does your Citrix agreement renew?`);
  }
  if (platform.includes("omnissa")) {
    nScore += 3;
    signals.positive.push(`Omnissa / VMware Horizon in current estate:Post-Broadcom acquisition uncertainty has accelerated Horizon customer reviews across EMEA. Horizon's architecture was built for vSphere — on Azure, it carries the complexity of a hypervisor-native tool in a hypervisor-free cloud. Nerdio's migration tools support the Horizon-to-AVD transition path.`);
  }
  if (platform.includes("rds")) {
    nScore += 6;
    signals.positive.push(`Windows RDS in current estate:Microsoft's investment is firmly in AVD as the cloud successor to RDS. Nerdio accelerates the RDS-to-AVD transition and provides the automation and management layer that makes cloud-native delivery operationally sustainable.`);
  }
  if (platform.includes("w365") && !platform.includes("avd_native")) {
    nScore += 8;
    signals.positive.push(`Windows 365 without AVD:Nerdio NME 7.0 is built specifically for Windows 365 management at scale. Provisioning, resizing, licence usage tracking, and the TCO Analyser are all available. Many organisations running W365 only are discovering that Nerdio unlocks the management capability that makes Cloud PC sustainable as user numbers grow.`);
  }
  if (platform.includes("avd_native")) {
    nScore += 10;
    signals.positive.push(`AVD currently managed natively:This is the clearest Nerdio use case — you already have AVD, and you are experiencing the operational overhead of managing it through native Azure tooling. Nerdio directly addresses every friction point of native AVD management: auto-scaling, image lifecycle, auto-heal, unified dashboard, and Scripted Actions.`);
  }
  if (platform.includes("none")) {
    nScore += 10;
    signals.positive.push("Greenfield deployment:The cleanest Nerdio scenario. No migration risk, no parallel operation complexity. Nerdio's deployment wizard sets up a fully automated, production-ready AVD environment in hours. Deploy the right architecture from day one.");
  }

  /* ── Final verdict logic ── */
  const pos  = signals.positive.length;
  const caut = signals.caution.length;
  const disq = signals.disqualify.length;

  if (disq > 0 || nScore < -5)          verdict = "poor";
  else if (scale === "under100" && caut >= 2) verdict = "marginal";
  else if (caut >= 4 && pos <= 3)        verdict = "marginal";
  else if (pos >= 7 && caut <= 1)        verdict = "strong";
  else if (pos >= 4)                     verdict = "good";
  else                                   verdict = "marginal";

  /* ── Platform comparison scores ── */
  const platScores = {
    "AVD + Nerdio Manager": Math.max(0, Math.min(100, 48 + nScore)),
    "Native AVD (no tooling)": Math.max(0, Math.min(100,
      scale === "under100" ? 58 : scale === "100_500" ? 40 : 22)),
    "Citrix DaaS": Math.max(0, Math.min(100,
      microsoft === "non_ms" ? 65 :
      platform.includes("citrix") && microsoft !== "all_in_avd" && microsoft !== "moving_to_avd" ? 44 : 16)),
    "Omnissa Horizon": Math.max(0, Math.min(100,
      platform.includes("omnissa") && microsoft === "non_ms" ? 54 : 12)),
    "Parallels RAS": Math.max(0, Math.min(100,
      driver === "msp" && scale === "100_500" ? 30 :
      platform.includes("parallels") && microsoft === "non_ms" ? 38 : 10)),
  };

  return { signals, verdict, platScores };
}

/* ── QUESTIONS ── */
function renderQuestions() {
  const q   = QUESTIONS[state.currentQ];
  const tot = QUESTIONS.length;
  const ans = countAnswered();
  const pct = (ans / tot) * 100;
  const sel = getSelectedIds(q.id);
  const twoCol = q.options && q.options.length > 5 && q.type !== "ranked";

  /* Jump panel */
  const jumpHtml = state.showJump ? `
    <div class="jump-panel">
      <div class="jump-eyebrow">Jump to question</div>
      <div class="jump-dots">
        ${QUESTIONS.map((qq, i) => {
          const done = isQAnswered(qq.id);
          const cls  = i === state.currentQ ? "active" : done ? "done" : "";
          return `<button class="jump-dot ${cls}" data-jump="${i}" title="${qq.section}">${done && i !== state.currentQ ? "✓" : i+1}</button>`;
        }).join("")}
      </div>
      <div class="jump-names">
        ${QUESTIONS.map((qq, i) => `<button data-jump="${i}" class="${i === state.currentQ ? "cur" : ""}">${i+1}. ${qq.section}</button>`).join("")}
      </div>
    </div>` : "";

  /* Options — severity matrix or standard */
  let mainContent;
  if (q.type === "severity") {
    const sevState = state.answers[q.id] || {};
    const sevRows = q.areas.map(area => {
      const cur = sevState[area.id] || "";
      const hasRating = cur === "some" || cur === "major";
      return `<div class="sev-row${hasRating ? " has-rating" : ""}">
        <div class="sev-label">
          <span class="sev-label-icon">${area.icon}</span>
          <div class="sev-label-text">
            <div class="sev-label-title">${area.label}</div>
            <div class="sev-label-sub">${area.sub}</div>
          </div>
        </div>
        <div class="sev-cell">
          <button class="sev-btn${cur === "none" ? " active-none" : ""}" data-sev-id="${area.id}" data-sev-val="none"></button>
        </div>
        <div class="sev-cell">
          <button class="sev-btn${cur === "some" ? " active-some" : ""}" data-sev-id="${area.id}" data-sev-val="some"></button>
        </div>
        <div class="sev-cell">
          <button class="sev-btn${cur === "major" ? " active-major" : ""}" data-sev-id="${area.id}" data-sev-val="major"></button>
        </div>
      </div>`;
    }).join("");
    mainContent = `
      <div class="sev-header">
        <div class="sev-header-cell">Challenge area</div>
        <div class="sev-header-cell h-none">Not an issue</div>
        <div class="sev-header-cell h-some">Sometimes</div>
        <div class="sev-header-cell h-major">Major pain</div>
      </div>
      ${sevRows}`;
  } else {
    const optsHtml = q.options.map(opt => {
      const isSel = sel.includes(opt.id);
      const shape = q.type === "single" ? "ci" : "sq";
      const checkHtml = `<div class="opt-check ${shape}">${isSel ? "✓" : ""}</div>`;
      return `
      <button class="opt${isSel ? " selected" : ""}" data-opt="${opt.id}">
        <span class="opt-icon">${opt.icon}</span>
        <div class="opt-body">
          <div class="opt-label">${opt.label}</div>
          <div class="opt-sub">${opt.sub}</div>
        </div>
        ${checkHtml}
      </button>`;
    }).join("");
    mainContent = `<div class="opts${twoCol ? " two-col" : ""}">${optsHtml}</div>`;
  }

  const isCurAnswered = isQAnswered(q.id);
  const isLast = state.currentQ === tot - 1;

  return `
  <header class="hdr">
    ${logoHtml(true)}
    <div class="hdr-right">
      <button class="btn-sm" id="btn-jump">${state.showJump ? "Close" : "Jump To"}</button>
      <button class="btn-sm" id="btn-see-results">See Results</button>
    </div>
  </header>
  ${jumpHtml}
  <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
  <div class="prog-meta"><span>${q.section}</span><span>${ans} / ${tot} answered</span></div>

  <div class="card fade-wrap">
    <div class="q-eyebrow"><span>${q.icon}</span><span>Question ${state.currentQ + 1} of ${tot}</span></div>
    <h2 class="q-title">${q.title}</h2>
    <p class="q-sub">${q.subtitle}</p>
    ${q.type === "multi" ? '<p class="q-hint">Select all that apply</p>' : ""}
    ${mainContent}
    <div class="nav-row">
      <button class="btn-secondary" id="btn-back">← Back</button>
      ${q.type === "multi" || q.type === "severity"
        ? `<button class="btn-primary${q.type === "multi" && !isCurAnswered ? " dim" : ""}" id="btn-next">${isLast ? "See Results →" : "Continue →"}</button>`
        : `<button class="btn-ghost" id="btn-skip">Skip this question</button>`}
    </div>
  </div>
  <div class="dot-trail">
    ${QUESTIONS.map((qq, i) => {
      const done = isQAnswered(qq.id);
      const cls  = i === state.currentQ ? "active" : done ? "done" : "";
      return `<button class="${cls}" data-jump="${i}" title="${qq.section}"></button>`;
    }).join("")}
  </div>`;
}

/* ── RESULTS ── */
function renderResults() {
  const r = scoreAnswers(state.answers, state.priorities);
  const v = VERDICTS[r.verdict];
  const sorted = Object.entries(r.platScores).sort((a, b) => b[1] - a[1]);
  const topPlat = sorted[0][0];

  function sigPanelHtml(items, col, label, icon, bgOp) {
    if (!items.length) return "";
    const titleColMap = { "#1E9DB8":"#4fb8ce", "#CDFF4E":"#a8e63a", "#ff4d6d":"#ff8899", "#f59e0b":"#fcd34d" };
    const titCol = titleColMap[col] || col;
    const itemsHtml = items.map(sig => {
      const ci = sig.indexOf(":");
      const title = ci > -1 ? sig.slice(0, ci) : sig;
      const body  = ci > -1 ? sig.slice(ci + 1).trim() : "";
      // Check if title contains priority info
      const hasPrio = title.includes("Priority");
      return `<div class="sig-item" style="border-left-color:${col}">
        ${hasPrio ? `<div class="sig-prio">${title.match(/\(Priority (\d)\)/)?.[0] || ""}</div>` : ""}
        <div class="sig-title" style="color:${titCol}">${title.replace(/\s*\(Priority \d\)/,"")}</div>
        ${body ? `<div class="sig-body">${body}</div>` : ""}
      </div>`;
    }).join("");
    return `
    <div class="sig-panel" style="background:${col}${bgOp||"12"};border-color:${col}30">
      <div class="sig-ey" style="color:${col}">${icon} ${label} (${items.length})</div>
      <div class="sig-list">${itemsHtml}</div>
    </div>`;
  }

  const isPoor = r.verdict === "poor";
  const stepsData = isPoor ? [
    { icon:"🗺", title:"Revisit If Platform Direction Changes",   body:"If the organisation moves toward AVD or Windows 365 as the strategic platform, Nerdio becomes an immediate fit. Keep this evaluation on file.", tag:"Future", col:"#8fa8b2" },
    { icon:"📊", title:"Use the Free Nerdio AVD Modeler",         body:"Even without a current project, the free AVD Cost Modeler at nmeadvisor.getnerdio.com quantifies what AVD would look like — useful for future planning.", tag:"Anytime", col:"#1E9DB8" },
  ] : [
    { icon:"🚀", title:"Start the 30-Day Free Trial",             body:"Deploy Nerdio Manager via Azure Marketplace at zero licence cost. Gets the platform live in your own Azure subscription before commercial conversations complete — critical for real baseline data.", tag:"Immediate", col:"#CDFF4E" },
    { icon:"📊", title:"Capture Baseline Azure Cost Data",         body:"Export 4 weeks of Azure compute spend from Azure Cost Management before enabling auto-scaling. This becomes the 'before' benchmark for your ROI business case.", tag:"Week 1", col:"#1E9DB8" },
    { icon:"⚡", title:"Enable Auto-Scaling on a Pilot Host Pool", body:"Configure auto-scaling for a single host pool and run for 2 weeks. Compare Azure Cost Management data before and after. This single data set typically proves the entire business case.", tag:"Week 2–3", col:"#1E9DB8" },
    { icon:"📋", title:"Build the Business Case from POV Data",    body:"Use the Nerdio Advisor TCO Analyser and 4-week POV data to build a CFO-ready summary. Nerdio's team can support the business case preparation with benchmarks.", tag:"Week 4", col:"#A795C7" },
  ];

  const stepsHtml = stepsData.map(st => `
    <div class="step-card">
      <div class="step-top">
        <span class="step-icon">${st.icon}</span>
        <span class="step-tag" style="color:${st.col};border-color:${st.col}44;background:${st.col}18">${st.tag}</span>
      </div>
      <div class="step-title">${st.title}</div>
      <div class="step-body">${st.body}</div>
    </div>`).join("");

  const barsHtml = sorted.map(([plat, score], i) => {
    const isNerdio = plat.includes("Nerdio");
    const isTop = i === 0;
    const barBg = isNerdio
      ? "linear-gradient(90deg,#1E9DB8,#CDFF4E)"
      : isTop ? "#156e80" : "#2e5060";
    return `
    <div class="score-row">
      <div class="score-meta">
        <span class="score-name${isNerdio?" nerdio":""}">${isNerdio?"⭐ ":""}${plat}</span>
        <span class="score-pct${isTop?" top":""}">${score}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${score}%;background:${barBg}"></div></div>
    </div>`;
  }).join("");

  const sumHtml = QUESTIONS.map(qq => {
    const ans = state.answers[qq.id];
    if (!ans || (Array.isArray(ans) && ans.length === 0)) return "";
    if (qq.type === "severity" && (typeof ans !== "object" || Array.isArray(ans))) return "";
    let labels;
    if (qq.type === "severity") {
      const sevMap = { major: "⚠ Major pain", some: "~ Sometimes" };
      const rated = (qq.areas || []).filter(a => ans[a.id] === "major" || ans[a.id] === "some");
      if (!rated.length) return "";
      labels = rated.map(a => `${a.label} (${sevMap[ans[a.id]]})`).join(", ");
    } else if (Array.isArray(ans)) {
      const prios = qq.type === "ranked" ? (state.priorities[qq.id] || {}) : {};
      labels = ans.map(a => {
        const opt = qq.options.find(o => o.id === a);
        const p = prios[a];
        return opt ? `${opt.label}${p ? ` [P${p}]` : ""}` : a;
      }).join(", ");
    } else {
      labels = qq.options.find(o => o.id === ans)?.label || ans;
    }
    return `<div class="sum-item"><div class="sum-label">${qq.icon} ${qq.section}</div><div class="sum-val">${labels}</div></div>`;
  }).join("");

  return `
  <header class="hdr">
    ${logoHtml(true)}
    <div class="hdr-right">
      <button class="btn-sm" id="btn-edit">Edit Answers</button>
      <button class="btn-sm" id="btn-restart">Start Over</button>
    </div>
  </header>
  <div class="fade-wrap" style="padding-top:20px">

    <!-- VERDICT BANNER -->
    <div class="verdict-banner" style="background:${v.col}12;border-color:${v.col}">
      <div class="v-icon" style="background:${v.col};color:${v.txtCol}">${v.icon}</div>
      <div class="v-body">
        <div class="v-eyebrow" style="color:${v.col}">Nerdio Qualification Result</div>
        <div class="v-headline">${v.headline}</div>
        <div class="v-summary">${v.summary}</div>
      </div>
      <div class="v-badge" style="background:${v.col};color:${v.txtCol}">${v.label}</div>
    </div>

    <!-- PLATFORM SCORES -->
    <div class="card mt12">
      <div class="r-eyebrow" style="color:#1E9DB8">Platform Fit Scores — Based on Your Profile</div>
      ${barsHtml}
    </div>

    <!-- SIGNALS -->
    <div class="signals-grid mt12">
      <div class="sig-col">
        ${sigPanelHtml(r.signals.positive, "#1E9DB8", "Positive Signals", "✓")}
      </div>
      <div class="sig-col">
        ${sigPanelHtml(r.signals.disqualify, "#ff4d6d", "Disqualifying Factors", "✕", "0a")}
        ${sigPanelHtml(r.signals.caution, "#f59e0b", "Considerations", "⚠")}
      </div>
    </div>

    <!-- NEXT STEPS -->
    <div class="steps-panel" style="background:rgba(4,40,56,0.75);border-color:rgba(205,255,78,0.25)">
      <div class="r-eyebrow" style="color:#CDFF4E">Recommended Next Steps</div>
      <div class="steps-grid">${stepsHtml}</div>
    </div>

    <!-- NERDIO LINKS -->
    <div class="nerdio-strip">
      <span class="ns-icon">🔗</span>
      <div style="flex:1">
        <div class="ns-title">Useful Nerdio Resources</div>
        <div class="ns-body">Free 30-day trial available on Azure Marketplace · AVD Cost Modeler at nmeadvisor.getnerdio.com · NME Help Centre at nmehelp.getnerdio.com · NMM Help Centre at nmmhelp.getnerdio.com</div>
        <div class="ns-link">getnerdio.com</div>
      </div>
    </div>

    <!-- ANSWER SUMMARY -->
    <div class="card">
      <div class="r-eyebrow" style="color:var(--grey)">Your Answers — Summary</div>
      <div class="sum-grid">${sumHtml}</div>
      <button class="btn-secondary mt16" id="btn-edit2">← Edit Answers</button>
    </div>

  </div>`;
}

/* ══════════════════════ RENDER + EVENTS ══════════════════════ */
function render() {
  const app = document.getElementById("app");
  if (state.step === "intro")     app.innerHTML = renderIntro();
  else if (state.step === "questions") app.innerHTML = renderQuestions();
  else if (state.step === "results")   app.innerHTML = renderResults();
  attachEvents();
}

function attachEvents() {
  /* Intro */
  const btnStart = document.getElementById("btn-start");
  if (btnStart) btnStart.addEventListener("click", () => fade(() => { state.step = "questions"; }));

  /* Questions nav */
  const btnBack = document.getElementById("btn-back");
  if (btnBack) btnBack.addEventListener("click", () => {
    fade(() => { if (state.currentQ > 0) state.currentQ--; else state.step = "intro"; });
  });

  const btnNext = document.getElementById("btn-next");
  if (btnNext) {
    btnNext.addEventListener("click", () => {
      if (btnNext.classList.contains("dim")) return; // answered check is visual only
      fade(() => {
        if (state.currentQ < QUESTIONS.length - 1) state.currentQ++;
        else state.step = "results";
      });
    });
  }

  const btnSkip = document.getElementById("btn-skip");
  if (btnSkip) btnSkip.addEventListener("click", () => {
    fade(() => {
      if (state.currentQ < QUESTIONS.length - 1) state.currentQ++;
      else state.step = "results";
    });
  });

  const btnJump = document.getElementById("btn-jump");
  if (btnJump) btnJump.addEventListener("click", () => { state.showJump = !state.showJump; render(); });

  const btnSeeResults = document.getElementById("btn-see-results");
  if (btnSeeResults) btnSeeResults.addEventListener("click", () => fade(() => { state.step = "results"; }));

  /* Option clicks — standard questions */
  const q = state.step === "questions" ? QUESTIONS[state.currentQ] : null;
  if (q && q.type !== "severity") {
    document.querySelectorAll(".opt").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const optId = btn.dataset.opt;

        if (q.type === "single") {
          state.answers[q.id] = optId;
          setTimeout(() => {
            fade(() => {
              if (state.currentQ < QUESTIONS.length - 1) state.currentQ++;
              else state.step = "results";
            });
          }, 160);
        } else {
          /* multi — toggle */
          let cur = state.answers[q.id] || [];
          if (!Array.isArray(cur)) cur = [cur];
          const exclusive = (optId === "none" || optId === "no_blockers");
          if (exclusive) {
            state.answers[q.id] = cur.includes(optId) ? [] : [optId];
          } else {
            const filtered = cur.filter(x => x !== "none" && x !== "no_blockers");
            if (filtered.includes(optId)) {
              state.answers[q.id] = filtered.filter(x => x !== optId);
            } else {
              state.answers[q.id] = [...filtered, optId];
            }
          }
          render(); attachEvents();
        }
      });
    });
  }

  /* Severity button clicks — event delegation to avoid re-attachment issues */
  if (q && q.type === "severity") {
    const app = document.getElementById("app");
    if (app && !app._sevListenerAttached) {
      app._sevListenerAttached = true;
      app.addEventListener("click", function(e) {
        const btn = e.target.closest ? e.target.closest(".sev-btn") : null;
        if (!btn) return;
        if (state.step !== "questions") return;
        const curQ = QUESTIONS[state.currentQ];
        if (!curQ || curQ.type !== "severity") return;
        const id  = btn.dataset.sevId;
        const val = btn.dataset.sevVal;
        if (!id || !val) return;
        if (!state.answers[curQ.id]) state.answers[curQ.id] = {};
        if (state.answers[curQ.id][id] === val) {
          delete state.answers[curQ.id][id];
        } else {
          state.answers[curQ.id][id] = val;
        }
        render();
      });
    }
  }

  /* Jump buttons */
  document.querySelectorAll("[data-jump]").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.jump);
      fade(() => { state.currentQ = idx; state.step = "questions"; state.showJump = false; });
    });
  });

  /* Results buttons */
  const btnEdit  = document.getElementById("btn-edit");
  const btnEdit2 = document.getElementById("btn-edit2");
  if (btnEdit)  btnEdit.addEventListener("click",  () => fade(() => { state.step = "questions"; }));
  if (btnEdit2) btnEdit2.addEventListener("click", () => fade(() => { state.step = "questions"; }));

  const btnRestart = document.getElementById("btn-restart");
  if (btnRestart) btnRestart.addEventListener("click", () => {
    fade(() => { state.answers = {}; state.priorities = {}; state.currentQ = 0; state.step = "intro"; state.showJump = false; });
  });
}

/* Boot */
render();
</script>
</body>
</html>
